<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090b10" />
    <meta
      name="description"
      content="TokenPanel admin console for AI API customers, billing, usage limits, model pricing, and profit analytics."
    />
    <title>TokenPanel — Admin Console</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("tp_admin_theme");
          var el = document.documentElement;
          el.classList.remove("dark", "light");
          el.classList.add(t === "light" ? "light" : "dark");
          el.style.colorScheme = t === "light" ? "light" : "dark";
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
